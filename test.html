<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCode — test</title>
  <link rel="stylesheet" href="codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="codemirror/theme/eclipse.css">
  <link rel="stylesheet" href="codemirror/addon/hint/show-hint.css">
  <link rel="stylesheet" href="css/editorStyle.css">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f0f2f5; }
    h1 { padding: 16px 24px; margin: 0; background: #1e293b; color: white; font-size: 18px; }

    .tabs { display: flex; gap: 4px; padding: 12px 24px 0; background: #1e293b; }
    .tab-btn { padding: 8px 20px; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; background: #334155; color: #94a3b8; }
    .tab-btn.active { background: #f0f2f5; color: #1e293b; font-weight: 600; }

    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    .editor-box { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .editor-box .label { padding: 10px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-family: monospace; font-size: 13px; color: #475569; font-weight: 600; }
    .editor-slot { height: 380px; display: flex; flex-direction: column; }

    .controls { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary:hover { background: #cbd5e1; }

    .output { margin-top: 12px; padding: 12px 16px; background: #1e293b; color: #e2e8f0; border-radius: 8px; font-family: monospace; font-size: 13px; min-height: 48px; white-space: pre-wrap; }
    .status { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>

  <h1>SmartCode — test</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('java')">Java</button>
    <button class="tab-btn" onclick="showTab('c')">C / C++</button>
    <button class="tab-btn" onclick="showTab('multi')">Več editorjev</button>
  </div>

  <!-- TAB: Java -->
  <div id="tab-java" class="tab-content active">
    <div class="editor-box">
      <div class="label">Main.java</div>
      <div id="ed-java" class="editor-slot"></div>
    </div>
    <div class="controls">
      <button class="btn-primary" onclick="testGetContent('java')">getContent()</button>
      <button class="btn-secondary" onclick="testSetContent('java')">setContent() — zamenjaj</button>
      <span class="status" id="status-java"></span>
    </div>
    <div class="output" id="out-java">— izhod —</div>
  </div>

  <!-- TAB: C -->
  <div id="tab-c" class="tab-content">
    <div class="editor-box">
      <div class="label">main.c</div>
      <div id="ed-c" class="editor-slot"></div>
    </div>
    <div class="controls">
      <button class="btn-primary" onclick="testGetContent('c')">getContent()</button>
      <button class="btn-secondary" onclick="testSetContent('c')">setContent() — zamenjaj</button>
      <span class="status" id="status-c"></span>
    </div>
    <div class="output" id="out-c">— izhod —</div>
  </div>

  <!-- TAB: Več editorjev -->
  <div id="tab-multi" class="tab-content">
    <p style="color:#475569;font-size:14px;margin:0 0 16px">Simulacija  3 neodvisni urejevalniki na isti strani. Vsak ima svojo vsebino in diagnostike.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
      <div>
        <div class="editor-box">
          <div class="label">BubbleSort.java</div>
          <div id="ed-m1" class="editor-slot" style="height:280px;"></div>
        </div>
      </div>
      <div>
        <div class="editor-box">
          <div class="label">QuickSort.java</div>
          <div id="ed-m2" class="editor-slot" style="height:280px;"></div>
        </div>
      </div>
      <div>
        <div class="editor-box">
          <div class="label">utils.c</div>
          <div id="ed-m3" class="editor-slot" style="height:280px;"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn-primary" onclick="testMultiRead()">Preberi vse 3</button>
      <button class="btn-secondary" onclick="testMultiSet()">Nastavi novo vsebino</button>
    </div>
    <div class="output" id="out-multi">— izhod —</div>
  </div>

  <script src="codemirror/lib/codemirror.js"></script>
  <script src="codemirror/mode/clike/clike.js"></script>
  <script src="codemirror/addon/edit/matchbrackets.js"></script>
  <script src="codemirror/addon/edit/closebrackets.js"></script>
  <script src="codemirror/addon/hint/show-hint.js"></script>
  <script src="js/config.js"></script>
  <script src="langserver/js/lspClient.js"></script>
  <script src="js/smartCodeEditor.js"></script>
  <script src="js/editorMain.js"></script>

  <script>
    const SINGLE = smartCodeEditor.editorMode.SINGLE;

    // Inicializacija editorjev 

    var edJava = smartCodeEditor.initEditor("ed-java", false, false, true, SINGLE, { language: "java" });
    var edC    = smartCodeEditor.initEditor("ed-c",    false, false, true, SINGLE, { language: "c" });

    var edM1 = smartCodeEditor.initEditor("ed-m1", false, false, true, SINGLE, { language: "java" });
    var edM2 = smartCodeEditor.initEditor("ed-m2", false, false, true, SINGLE, { language: "java" });
    var edM3 = smartCodeEditor.initEditor("ed-m3", false, false, true, SINGLE, { language: "c" });

    edJava.whenReady().then(() => {
      document.getElementById("status-java").textContent = "✓ LSP ready";
      edJava.setContent(
`public class Main {

    public static void main(String[] args) {
        System.out.println("Hello!");
    }
}`);
    });

    edC.whenReady().then(() => {
      document.getElementById("status-c").textContent = "✓ LSP ready";
      edC.setContent(
`#include <stdio.h>

int main(void) {
    printf("Hello!\\n");
    return 0;
}`);
    });

    edM1.whenReady().then(() => edM1.setContent(
`public class BubbleSort {
    public static void sort(int[] a) {
        for (int i = 0; i < a.length - 1; i++)
            for (int j = 0; j < a.length - i - 1; j++)
                if (a[j] > a[j+1]) {
                    int t = a[j]; a[j] = a[j+1]; a[j+1] = t;
                }
    }
}`));

    edM2.whenReady().then(() => edM2.setContent(
`public class QuickSort {
    public static void sort(int[] a, int lo, int hi) {
        if (lo < hi) {
            int p = partition(a, lo, hi);
            sort(a, lo, p - 1);
            sort(a, p + 1, hi);
        }
    }
    private static int partition(int[] a, int lo, int hi) {
        int pivot = a[hi], i = lo - 1;
        for (int j = lo; j < hi; j++)
            if (a[j] <= pivot) { int t = a[++i]; a[i] = a[j]; a[j] = t; }
        int t = a[i+1]; a[i+1] = a[hi]; a[hi] = t;
        return i + 1;
    }
}`));

    edM3.whenReady().then(() => edM3.setContent(
`#include <stdio.h>

int add(int a, int b) { return a + b; }
int sub(int a, int b) { return a - b; }

int main(void) {
    printf("%d\\n", add(3, 4));
    return 0;
}`));

    // Test funkcije 

    const editors = { java: edJava, c: edC };

    function testGetContent(lang) {
      const content = editors[lang].getContent();
      document.getElementById("out-" + lang).textContent =
        "getContent() → " + content.length + " znakov:\n\n" + content;
    }

    function testSetContent(lang) {
      const newCode = lang === "java"
        ? `public class Main {\n    // Nova vsebina nastavljena z setContent()\n    public static void main(String[] args) {\n        int x = 42;\n        System.out.println(x);\n    }\n}`
        : `#include <stdio.h>\n\n// Nova vsebina nastavljena z setContent()\nint main(void) {\n    int x = 42;\n    printf("%d\\n", x);\n    return 0;\n}`;
      editors[lang].setContent(newCode);
      document.getElementById("out-" + lang).textContent = "setContent() — vsebina zamenjena.";
    }

    function testMultiRead() {
      document.getElementById("out-multi").textContent =
        "BubbleSort.java  → " + edM1.getContent().length + " znakov\n" +
        "QuickSort.java   → " + edM2.getContent().length + " znakov\n" +
        "utils.c          → " + edM3.getContent().length + " znakov\n\n" +
        "Vsi editorji delajo neodvisno.";
    }

    function testMultiSet() {
      edM1.setContent(`public class BubbleSort {\n    // Zamenjano s setContent()\n}`);
      edM2.setContent(`public class QuickSort {\n    // Zamenjano s setContent()\n}`);
      edM3.setContent(`// utils.c — zamenjano s setContent()\n#include <stdio.h>\n`);
      document.getElementById("out-multi").textContent = "setContent() poklican na vseh 3 editorjih.";
    }

    // ── Tab navigacija ────────────────────────────────────────────────

    function showTab(name) {
      document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
      document.getElementById("tab-" + name).classList.add("active");
      event.target.classList.add("active");

      // Refresh editorjev ko postanejo vidni
      setTimeout(() => {
        if (name === "java") edJava.cm?.refresh();
        if (name === "c")    edC.cm?.refresh();
        if (name === "multi") { edM1.cm?.refresh(); edM2.cm?.refresh(); edM3.cm?.refresh(); }
      }, 50);
    }
  </script>

</body>
</html>
