<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCode • Code Editor</title>
  <link rel="icon" href="img/smartCodeLogo2.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="codemirror/lib/codemirror.css" />
  <link rel="stylesheet" href="codemirror/theme/eclipse.css" />
  <link rel="stylesheet" href="codemirror/theme/abcdef.css" />
  <link rel="stylesheet" href="codemirror/addon/hint/show-hint.css" />
  <link rel="stylesheet" href="css/editorStyle.css" />
</head>
<body>

  <div id="editorDiv" style="height: 100vh;"></div>

  <script src="codemirror/lib/codemirror.js"></script>
  <script src="codemirror/mode/clike/clike.js"></script>
  <script src="codemirror/addon/edit/matchbrackets.js"></script>
  <script src="codemirror/addon/edit/closebrackets.js"></script>
  <script src="codemirror/addon/hint/show-hint.js"></script>
  <script src="js/config.js"></script>
  <script src="langserver/js/lspClient.js"></script>
  <script src="js/smartCodeEditor.js"></script>
  <script src="js/editorMain.js"></script>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);

      // PROJECT način naj privzeto odpira projekt iz <algator_lsync_root>.
      // Primer:
      //   editor.html
      //     -> prvi projekt iz GET /projects (dejansko stanje algator_lsync_root)
      //
      //   editor.html?projectFolder=PROJ-BasicSort
      //     -> algator_lsync_root/PROJ-BasicSort
      let projectFolder = params.get("projectFolder") || params.get("folder") || "";

      if (!projectFolder) {
        try {
          const baseUrl =
            (typeof SmartCodeConfig !== "undefined" && SmartCodeConfig.server?.httpUrl) ||
            "http://localhost:3000";
          const res = await fetch(`${baseUrl}/projects`);
          if (res.ok) {
            const data = await res.json();
            projectFolder = (data.projects && data.projects[0]) || "";
          }
        } catch (e) {
          console.warn("Privzetega projekta ni bilo mogoče pridobiti iz /projects:", e.message);
        }
      }

      if (!projectFolder) {
        document.getElementById("editorDiv").innerHTML =
          '<div style="padding:2rem;color:#900;">' +
          'V &lt;algator_lsync_root&gt; ni nobenega projekta. ' +
          'Dodajte projekt v algator_projects/ ali podajte ?projectFolder=IME v URL.' +
          '</div>';
        return;
      }

      var ed = smartCodeEditor.initEditor(
        "editorDiv",
        true,
        true,
        true,
        smartCodeEditor.editorMode.PROJECT,
        {
          projectFolder: projectFolder,
          folder: projectFolder,
          syncRoot: projectFolder,
          lsyncEnabled: false
        }
      );

      window.smartCodeEditorInstance = ed;
    })();
  </script>

</body>
</html>
