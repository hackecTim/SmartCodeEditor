<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>SmartCode • SINGLE</title>
  <link rel="icon" href="img/smartCodeLogo2.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="codemirror/theme/eclipse.css">
  <link rel="stylesheet" href="codemirror/addon/hint/show-hint.css">
  <link rel="stylesheet" href="css/editorStyle.css">
  <link rel="stylesheet" href="css/editroSingle.css">
</head>
<body>

<header>
  <div>SmartCode — SINGLE mode</div>
  <a href="index.html">Back</a>
</header>

<div class="page">
  <div class="editor-card">
    <div class="editor-title" id="editorTitle">Main.java</div>
    <div id="singleEditor"></div>
  </div>
</div>

<script src="codemirror/lib/codemirror.js"></script>
<script src="codemirror/mode/clike/clike.js"></script>
<script src="codemirror/addon/edit/matchbrackets.js"></script>
<script src="codemirror/addon/edit/closebrackets.js"></script>
<script src="codemirror/addon/hint/show-hint.js"></script>

<script src="js/config.js"></script>
<script src="langserver/js/lspClient.js"></script>
<script src="js/smartCodeEditor.js"></script>
<script src="js/editorMain.js"></script>

<script>
  // Preberi projectFolder iz URL parametra: ?projectFolder=PROJ-BasicSort
  // ali iz query stringa: ?folder=PROJ-BasicSort
  (function () {
    const params = new URLSearchParams(window.location.search);
    const projectFolder = params.get("projectFolder") || params.get("folder") || "single";

    // Posodobi naslov
    document.getElementById("editorTitle").textContent =
      projectFolder + " / Main.java";

    // savePath: relativna pot znotraj projectFolder; shrani se v <algator_lsync_root>/<projectFolder>/src/Main.java
    const savePath   = "src/Main.java";
    const syncRoot   = projectFolder;
    const folder     = projectFolder + "/src";

    var ed = smartCodeEditor.initEditor(
      "singleEditor",
      false,
      false,
      true,
      smartCodeEditor.editorMode.SINGLE,
      {
        language:     "java",
        folder:       folder,
        savePath:     savePath,
        syncRoot:     syncRoot,
        projectFolder: projectFolder,   // nov parameter → pošlje se na /project-folder
        lsyncEnabled: false,            // lsync je ločen docker container

        content: `public class Main {\n    public static void main(String[] args) {\n        \n    }\n}`
      }
    );

    window.smartCodeEditorInstance = ed;
  })();
</script>

</body>
</html>
