version: "3.9"

# SmartCode architecture:
#   <algator_projects>  -> smartcode-lsync -> <algator_lsync_root> -> smartcode-lsp/editor
#
# lsync:
#   - vidi <algator_projects> kot :ro
#   - piše v <algator_lsync_root>
#   - gleda CELOTNO mapo <algator_projects>, ne samo odprtega projekta
#
# lsp/editor:
#   - nimata dostopa do <algator_projects>
#   - LSP za code completion uporablja <algator_lsync_root>
#   - PROJECT editor za shranjevanje uporablja ločeno workspace mapo

services:
  smartcode-lsync:
    build:
      context: docker-lsync
    image: smartcode-lsync
    container_name: smartcode-lsync
    restart: unless-stopped
    environment:
      LSYNC_SOURCE: /algator_projects
      LSYNC_TARGET: /algator_lsync_root
      LSYNC_POLL_INTERVAL: "1"
      LSYNC_VERBOSE: "1"
    volumes:
      - ${ALGATOR_PROJECTS}:/algator_projects:ro
      - ${ALGATOR_LSYNC}:/algator_lsync_root:rw

  smartcode-lsp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: smartcode-lsp
    container_name: smartcode-lsp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      LSYNC_ROOT: /algator_lsync_root
      WORKSPACE_ROOT: /workspace
      PROJECT_FOLDER: ""
      JDTLS_DATA_DIR: /tmp/jdtls-data
      JAVA_CLASSPATH_REFRESH_MS: "0"
    volumes:
      - ${ALGATOR_LSYNC}:/algator_lsync_root:rw
      - ${SMARTCODE_WORKSPACE}:/workspace:rw
    depends_on:
      - smartcode-lsync
