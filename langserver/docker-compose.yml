version: "3.9"

services:
  smartcode-lsync:
    build:
      context: docker-lsync
    image: smartcode-lsync
    container_name: smartcode-lsync
    restart: unless-stopped
    environment:
      LSYNC_SOURCE: /algator_projects
      LSYNC_TARGET: /algator_lsync_root
      LSYNC_POLL_INTERVAL: "1"
      LSYNC_VERBOSE: "1"
    volumes:
      - ${ALGATOR_ROOT}:/algator_projects:ro
      - smartcode-lsync-root:/algator_lsync_root

  smartcode-lsp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: smartcode-lsp
    container_name: smartcode-lsp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      LSYNC_ROOT: /algator_lsync_root
      PROJECT_FOLDER: ""
      JDTLS_DATA_DIR: /tmp/jdtls-data
      JAVA_CLASSPATH_REFRESH_MS: "0"
    volumes:
      - smartcode-lsync-root:/algator_lsync_root
    depends_on:
      - smartcode-lsync

volumes:
  smartcode-lsync-root:
